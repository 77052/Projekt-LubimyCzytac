<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Lubimy Czytać</title>
    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="kontener">
        <h1>Lubimy Czytać</h1>

        <section class="sekcja_formularz">
            <h2>Dodaj / edytuj książkę</h2>
            <input type="hidden" id="idKsiazki">

            <label for="tytul">Tytuł</label>
            <input type="text" id="tytul">

            <label for="autor">Autor</label>
            <input type="text" id="autor">

           <label for="opis">Opis</label>
            <textarea id="opis"></textarea>

            <label for="ocena">Ocena (1-10)</label>
            <input type="number" id="ocena" min="1" max="10">

            <div class="przyciski">
                <button onclick="zapiszKsiazke()">Zapisz</button>
                <button onclick="wyczyscFormatke()">Wyczyść</button>
            </div>
        </section>

        <section class="sekcja_szukaj">
            <h2>Wyszukiwanie</h2>
            <input type="text" id="wyszukajFraze" placeholder="Szukaj po tytule lub autorze">
            <button onclick="wyszukajKsiazki()">Szukaj</button>
            <button onclick="ladujKsiazki()">Pokaż wszystkie</button>
        </section>

        <section class="sekcja_lista">
            <h2>Lista książek</h2>
            <div id="listaKsiazek"></div>
        </section>
    </div>

</body>

</html>
