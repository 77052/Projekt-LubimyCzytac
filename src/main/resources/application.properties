# ===================================================================
# Profil PRODUKCYJNY z bazą H2 (In-Memory)
# ===================================================================

# Ustawienia serwera (wymagane przez Render)
server.port=${PORT:10000}

# Połączenie z bazą danych H2
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Konfiguracja Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Włączenie konsoli H2 (przydatne do podglądu bazy pod adresem /h2-console)
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true
